app = "mcp-server-calculator-http"
primary_region = "hkg"

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "8001"

[[services]]
  internal_port = 8001
  protocol = "tcp"

  [services.concurrency]
    hard_limit = 25
    soft_limit = 20

  [[services.ports]]
    port = 443
    handlers = ["tls", "http"]
    force_https = true

  [[services.ports]]
    port = 80
    handlers = ["http"]
    force_https = false

  [[services.tcp_checks]]
    interval = "15s"
    timeout = "5s"
    restart_limit = 0
